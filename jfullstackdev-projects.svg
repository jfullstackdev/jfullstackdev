<svg width="520"
     height="180"
     viewBox="0 0 520 180"
     xmlns="http://www.w3.org/2000/svg"
     style="max-width:520px; width:100%; height:auto;">

  <defs>

    <!-- Window Gradient -->
    <linearGradient id="window"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

      <stop offset="0%"
            stop-color="#314766"/>

      <stop offset="100%"
            stop-color="#263a52"/>

    </linearGradient>

  </defs>

  <!-- Window -->

  <rect x="5"
        y="5"
        width="510"
        height="170"
        rx="26"
        fill="url(#window)"/>

  <!-- Top Bar -->

  <rect x="5"
        y="5"
        width="510"
        height="34"
        rx="26"
        fill="#415676"/>

  <!-- Radius Fix -->

  <rect x="5"
        y="22"
        width="510"
        height="17"
        fill="#415676"/>

  <!-- macOS Buttons -->

  <circle cx="33"
          cy="22"
          r="5"
          fill="#ff5f57"/>

  <circle cx="53"
          cy="22"
          r="5"
          fill="#febc2e"/>

  <circle cx="73"
          cy="22"
          r="5"
          fill="#28c840"/>

  <!-- Responsive Text + Cursor -->

  <text x="28"
        y="98"
        font-family="SFMono-Regular, Consolas, monospace"
        font-size="20"
        fill="#58a6ff">

    jfullstackdev-projects/

    <tspan>

      █

      <animate attributeName="opacity"
               values="1;0;1"
               dur="1s"
               repeatCount="indefinite"/>

    </tspan>

  </text>

</svg>
