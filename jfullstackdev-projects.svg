<svg width="520"
     height="180"
     viewBox="0 0 520 180"
     xmlns="http://www.w3.org/2000/svg"
     style="max-width:520px; width:100%; height:auto;">

  <defs>

    <linearGradient id="window"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

      <stop offset="0%"
            stop-color="#1b2129"/>

      <stop offset="100%"
            stop-color="#11161c"/>

    </linearGradient>

    <filter id="glow">

      <feGaussianBlur stdDeviation="1.5"
                      result="blur"/>

      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>

    </filter>

  </defs>

  <!-- Window -->

  <rect x="10"
        y="10"
        width="500"
        height="160"
        rx="18"
        fill="url(#window)"/>

  <!-- Top Bar -->

  <rect x="10"
        y="10"
        width="500"
        height="34"
        rx="18"
        fill="#21262d"/>

  <rect x="10"
        y="27"
        width="500"
        height="17"
        fill="#21262d"/>

  <!-- macOS Buttons -->

  <circle cx="38"
          cy="27"
          r="5"
          fill="#ff5f57"/>

  <circle cx="58"
          cy="27"
          r="5"
          fill="#febc2e"/>

  <circle cx="78"
          cy="27"
          r="5"
          fill="#28c840"/>

  <!-- Text -->

  <text x="95"
        y="98"
        font-family="SFMono-Regular, Consolas, monospace"
        font-size="20"
        fill="#58a6ff">

    jfullstackdev-projects/

  </text>

  <!-- Cursor -->

  <rect x="375"
        y="80"
        width="7"
        height="22"
        rx="2"
        fill="#58a6ff"
        filter="url(#glow)">

    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>

  </rect>

</svg>
