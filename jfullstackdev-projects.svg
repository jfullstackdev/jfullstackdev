<svg width="1200"
     height="420"
     viewBox="0 0 1200 420"
     xmlns="http://www.w3.org/2000/svg"
     style="max-width:700px; max-height:240px; width:100%; height:auto;">

  <defs>

    <linearGradient id="window"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">

      <stop offset="0%"
            stop-color="#1b2129"/>

      <stop offset="100%"
            stop-color="#11161c"/>

    </linearGradient>

  </defs>

  <!-- Small Window -->

  <rect x="360"
        y="120"
        width="480"
        height="130"
        rx="18"
        fill="url(#window)"/>

  <!-- Top Bar -->

  <rect x="360"
        y="120"
        width="480"
        height="32"
        rx="18"
        fill="#21262d"/>

  <rect x="360"
        y="136"
        width="480"
        height="16"
        fill="#21262d"/>

  <!-- Buttons -->

  <circle cx="390"
          cy="136"
          r="5"
          fill="#ff5f57"/>

  <circle cx="410"
          cy="136"
          r="5"
          fill="#febc2e"/>

  <circle cx="430"
          cy="136"
          r="5"
          fill="#28c840"/>

  <!-- Text -->

  <text x="455"
        y="198"
        font-family="SFMono-Regular, Consolas, monospace"
        font-size="20"
        fill="#58a6ff">

    jfullstackdev-projects/

  </text>

</svg>
